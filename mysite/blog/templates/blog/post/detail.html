{% extends 'blog/base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
    <article>
        <h2>{{ post.title }}</h2>
        <p class="meta">
            By {{ post.author }} on {{ post.published_at }}
        </p>
        <p>{{ post.body }}</p>
    </article>
{% endblock %}
